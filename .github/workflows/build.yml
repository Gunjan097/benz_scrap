name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter openpyxl requests pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name ResponseExtractor
          --collect-data customtkinter
          --hidden-import customtkinter
          --hidden-import openpyxl
          --hidden-import openpyxl.styles
          --hidden-import openpyxl.utils
          main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResponseExtractor-Windows
          path: dist/ResponseExtractor.exe
          retention-days: 30
